<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toggle Theme</title>

    <style>
      body {
        display: flex;
        height: 100vh;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: Arial, Helvetica, sans-serif;

        transition:
          background 0.5s ease,
          color 0.5s ease;
      }

      .btn {
        border-radius: 25px;
        padding: 12px 25px;
        font-size: 18px;
        cursor: pointer;

        color: black;
        background: white;
        border: 2px solid black;

        transition: all 0.3s ease;
      }

      .btn:hover {
        background: black;
        color: white;
        transform: scale(1.1);
      }

      .btn:active {
        transform: scale(0.95);
      }

      .dark {
        background: #000;
        color: white;
      }

      .dark button {
        background: black;
        color: white;
        border: 2px solid white;
      }

      .dark button:hover {
        background: white;
        color: black;
        transform: scale(1.1);
      }
    </style>
  </head>

  <body class="dark">
    <button class="btn">Toggle Dark Mode</button>

    <script>
      const btn = document.querySelector(".btn");

      btn.addEventListener("click", () => {
        document.body.classList.toggle("dark");

        if (document.body.classList.contains("dark")) {
          btn.innerText = "Toggle Light Mode";
        } else {
          btn.innerText = "Toggle Dark Mode";
        }
      });
    </script>
  </body>
</html>
