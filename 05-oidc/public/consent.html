<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f3f4f6;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      .card {
        background: white;
        border-radius: 12px;
        padding: 2rem;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      }

      .app-header {
        text-align: center;
        margin-bottom: 1.5rem;
      }

      .app-icon {
        width: 56px;
        height: 56px;
        background: #6366f1;
        border-radius: 12px;
        display: inline-grid;
        place-items: center;
        font-size: 1.5rem;
        margin-bottom: 0.75rem;
      }

      .app-header h2 {
        font-size: 1.1rem;
        color: #111;
      }

      .app-header h2 span {
        color: #6366f1;
        font-weight: 700;
      }

      .app-header p {
        font-size: 0.85rem;
        color: #6b7280;
        margin-top: 0.25rem;
      }

      .scopes {
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1.5rem;
      }

      .scopes p {
        font-size: 0.8rem;
        color: #6b7280;
        margin-bottom: 0.5rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .scope-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.9rem;
        color: #374151;
        padding: 0.35rem 0;
      }

      .scope-item::before {
        content: "✓";
        color: #10b981;
        font-weight: 700;
      }

      .divider {
        text-align: center;
        color: #9ca3af;
        font-size: 0.8rem;
        margin-bottom: 1rem;
      }

      input {
        width: 100%;
        padding: 0.65rem 0.875rem;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 0.95rem;
        margin-bottom: 0.75rem;
        outline: none;
        transition: border-color 0.15s;
      }

      input:focus {
        border-color: #6366f1;
      }

      .error {
        background: #fef2f2;
        border: 1px solid #fecaca;
        color: #dc2626;
        border-radius: 8px;
        padding: 0.65rem 0.875rem;
        font-size: 0.875rem;
        margin-bottom: 0.75rem;
        display: none;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
        margin-top: 0.5rem;
      }

      button {
        padding: 0.65rem;
        border-radius: 8px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: opacity 0.15s;
      }

      button:hover {
        opacity: 0.85;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-allow {
        background: #6366f1;
        color: white;
      }

      .btn-deny {
        background: #f3f4f6;
        color: #374151;
        border: 1px solid #d1d5db;
      }

      .footer {
        text-align: center;
        font-size: 0.78rem;
        color: #9ca3af;
        margin-top: 1.25rem;
      }
    </style>
  </head>
  <body></body>
  <div class="card">
    <div class="app-header">
      <div class="app-icon">🔐</div>
      <h2><span id="app-name">App</span> wants access</h2>
      <p>Sign in to your account to continue</p>
    </div>
    <div class="scopes">
      <p>This app will be able to</p>
      <div id="scope-list"></div>
    </div>

    <div class="divider">Enter your credentials to allow access</div>

    <div class="error" id="error-box"></div>

    <input
      type="email"
      id="email"
      placeholder="Email address"
      autocomplete="email"
    />
    <input
      type="password"
      id="password"
      placeholder="Password"
      autocomplete="current-password"
    />

    <div class="actions">
      <button class="btn-deny" id="btn-deny">Deny</button>
      <button class="btn-allow" id="btn-allow">Allow</button>
    </div>

    <div class="footer">
      Your credentials are verified by the auth server.<br />
      <strong id="app-name-footer"></strong> will not see your password.
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const clientId = params.get("client_id");
    const redirectUri = params.get("redirect_uri");
    const scope = params.get("scope") ?? "openid";
    const state = params.get("state") ?? "";

    const SCOPE_LABELS = {
      openid: "Verify your identity",
      email: "Read your email address",
      profile: "Read your name and profile picture",
    };
    const scopeList = document.getElementById("scope-list");
    scope.split(" ").forEach((s) => {
      const label = scopeList[s];
      const div = document.createElement("div");
      div.className = "scope-item";
      div.textContent = label;
      scopeList.appendChild(div);
    });

    fetch(`/o/3rd-party-client/${clientId}`)
      .then((r) => r.json())
      .then((data) => {
        document.getElementById("app-name").textContent = data.name;
        document.getElementById("app-name-footer").textContent = data.name;
      });

    document.getElementById("btn-deny").addEventListener("click", () => {
      const url = new URL(redirectUri);
      url.searchParams.set("error", "access_denied");
      if (state) url.searchParams.set("state", state);
      window.location.href = url.toString();
    });

    document.getElementById("btn-allow").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const errorBox = document.getElementById("error-box");
      const allowBtn = document.getElementById("btn-allow");

      errorBox.style.display = "none";

      if (!email || !password) {
        errorBox.textContent = "Please enter your email and password.";
        errorBox.style.display = "block";
        return;
      }

      allowBtn.disabled = true;
      allowBtn.textContent = "Verifying...";

      try {
        const res = await fetch("/o/3rd-party-cleint/authorize", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email,
            password,
            client_id: clientId,
            redirect_uri: redirectUri,
            scope,
            state,
          }),
        });

        const data = await res.json();

        if (!res.ok) {
          errorBox.textContent = data.message ?? "Invalid credentials.";
          errorBox.style.display = "block";
          allowBtn.disabled = false;
          allowBtn.textContent = "Allow";
          return;
        }

        // Server will return the redirect URL with the code
        window.location.href = data.redirectUrl;
      } catch (err) {
        errorBox.textContent = "Something went wrong. Please try again.";
        errorBox.style.display = "block";
        allowBtn.disabled = false;
        allowBtn.textContent = "Allow";
      }
    });
  </script>
</html>
